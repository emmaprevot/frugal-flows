name: frugal-flows
channels:
  - conda-forge
  - defaults
dependencies:
  - python >=3.11
  - ipykernel
  - ipywidgets
  - jax >=0.7
  - jaxlib >=0.7
  - matplotlib
  - ruff
  - equinox >=0.13
  - econml
  - optax
  - pre-commit
  - r-base # =4.2
  - rpy2 # =3.5
  - notebook
  - distrax
  - pytest
  - seaborn
  - pip
  - setuptools <81  # zepid 0.9.x imports pkg_resources, removed in setuptools 81+
  - scikit-learn
  - wandb
  - pip:
    # - pre-commit
    # - flowjax
    # - torch  # removed: no macOS x86_64 wheels after PyTorch 2.3
    - zepid
    - flowjax==19.1.0
    - paramax>=0.0.5
    # lineax>=0.1.1 requires jax>=0.10, which conda-forge does not ship yet (latest is 0.9.2).
    # Pinning to 0.1.0 (declared jax>=0.6.1) keeps the install resolvable without --no-deps.
    - lineax==0.1.0
    # - --editable ./flowjax/
    # - --editable ./torch-two-sample/
    - --editable ./


